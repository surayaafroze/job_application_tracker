<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    * {
      font-family: "Geist", sans-serif;
    }
  </style>
</head>

<body class="bg-[#F1F2F4]">
  <header class="w-10/12 mx-auto pt-[60px] ">
    <h1 class="text-3xl font-bold text-black">Job Application Tracker</h1>
    <div class="grid grid-cols-3 gap-4 mt-5">
      <div class="py-5 px-3.5 bg-white rounded-xl">
        <p>Total</p>
        <p id="total-count" class="text-black font-bold text-3xl">0</p>
      </div>
      <div class="py-5 px-3.5 bg-white rounded-xl ">
        <p>Interview</p>
        <p id="interview-count" class="text-[#10B981] font-bold text-3xl">0</p>
      </div>
      <div class="py-5 px-3.5 bg-white rounded-xl">
        <p>Rejected</p>
        <p id="rejected-count" class="text-[#EF4444] font-bold text-3xl">0</p>
      </div>

    </div>
<hr class="mt-8">
  </header>




  <main class="w-10/12 mx-auto pt-[60px]">
    <div class="flex justify-between items-center ">
      <div>Available Jobs</div>
      <div>8 jobs</div>
    </div>
    <div class="flex gap-3 mt-6">
      <button id="all-filter-btn" class="bg-[#3B82F6] py-1.5 px-8 rounded-xl ">
        <p class="font-bold text-white">All</p>
      </button>
      <button id="interview-filter-btn" class="bg-white py-1.5 px-8 rounded-xl ">
        <p >Interview</p>
      </button>
      <button id="rejected-filter-btn" class="bg-white py-1.5 px-9 rounded-xl ">
        <p >Rejected</p>
      </button>
    </div>
  </main>

  <main class="all-cards w-10/12 mx-auto pt-[60px]">
    <div class="flex justify-between">
      <div class="left space-y-6">
      <div class="space-y-1.5">
        <p>Mobile First Corp</p>
      <p class=" text-[#64748B]">React Native Developer</p>
      </div>
      <div>
        <p class=" text-[#64748B]">Remote
 • 
Full-time 
•
 $130,000 - $175,000</p>
      </div>
 <div >
  <p class="bg-gray-400 px-5 py-2 inline rounded-xl">Not Applied</p>
  <p class="mt-1">Build cross-platform mobile applications using React Native. Work on products used by millions of users worldwide.</p>
 </div>
 <div>
  <button class="border-2  border-red-400">interview</button>
  <button>Rejected</button>
 </div>
    </div>

    <div class="right">
      <img  src="Trash.png" alt="">
    </div>
    </div>

  </main>
</body>

</html>
